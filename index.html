<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Coding Agent驱动的储能安全模型闭环流程</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #061016;
      --bg-2: #081924;
      --panel: rgba(12, 28, 40, 0.78);
      --panel-2: rgba(16, 39, 54, 0.88);
      --line: rgba(122, 211, 255, 0.18);
      --line-strong: rgba(122, 211, 255, 0.42);
      --text: #edf8ff;
      --muted: #9ab0bf;
      --dim: #637785;
      --agent: #22d8ff;
      --agent-soft: rgba(34, 216, 255, 0.14);
      --battery: #42f2a1;
      --battery-soft: rgba(66, 242, 161, 0.14);
      --cbb: #62b8ff;
      --cbb-soft: rgba(98, 184, 255, 0.14);
      --human: #ffbd59;
      --human-soft: rgba(255, 189, 89, 0.14);
      --radius: 18px;
      --shadow: 0 28px 80px rgba(0, 0, 0, 0.42);
      font-family: "Inter", "Segoe UI", "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
      min-width: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at 16% 8%, rgba(34, 216, 255, 0.16), transparent 30%),
        radial-gradient(circle at 78% 24%, rgba(66, 242, 161, 0.10), transparent 28%),
        linear-gradient(140deg, var(--bg), #071620 48%, #051018 100%);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -1;
      background-image:
        linear-gradient(rgba(122, 211, 255, 0.055) 1px, transparent 1px),
        linear-gradient(90deg, rgba(122, 211, 255, 0.055) 1px, transparent 1px);
      background-size: 58px 58px;
      mask-image: linear-gradient(to bottom, black, transparent 82%);
    }

    button,
    a {
      font: inherit;
    }

    button {
      color: inherit;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      width: min(1540px, calc(100% - 44px));
      margin: 0 auto;
      padding: 28px 0 64px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 34px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-weight: 750;
      letter-spacing: 0.01em;
      line-height: 1.35;
    }

    .brand-mark {
      width: 36px;
      height: 36px;
      display: grid;
      place-items: center;
      border-radius: 11px;
      border: 1px solid var(--line-strong);
      background: linear-gradient(135deg, rgba(34, 216, 255, 0.18), rgba(66, 242, 161, 0.12));
      box-shadow: 0 0 30px rgba(34, 216, 255, 0.16);
    }

    .brand-mark svg {
      width: 21px;
      height: 21px;
    }

    .nav {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
      color: var(--muted);
      font-size: 14px;
    }

    .nav a {
      padding: 9px 12px;
      border-radius: 999px;
      border: 1px solid transparent;
    }

    .nav a:hover {
      color: var(--text);
      border-color: var(--line);
      background: rgba(255, 255, 255, 0.04);
    }

    .section {
      margin-top: 34px;
      position: relative;
    }

    #framework {
      z-index: 30;
    }

    #demo {
      z-index: 1;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 24px;
      margin-bottom: 12px;
    }

    .section-head h2 {
      margin: 0;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: #e8fbff;
      font-size: clamp(18px, 1.7vw, 24px);
      font-weight: 850;
      line-height: 1.25;
      letter-spacing: 0.04em;
    }

    .section-head h2::before {
      content: "";
      width: 7px;
      height: 20px;
      border-radius: 999px;
      background: linear-gradient(180deg, var(--agent), var(--battery));
      box-shadow: 0 0 18px rgba(34, 216, 255, 0.34);
      flex: 0 0 auto;
    }

    .section-head p {
      margin: 8px 0 0;
      max-width: 760px;
      color: var(--muted);
      line-height: 1.68;
    }

    .glass {
      border: 1px solid rgba(122, 211, 255, 0.18);
      border-radius: var(--radius);
      background: linear-gradient(150deg, rgba(12, 28, 40, 0.83), rgba(7, 17, 26, 0.62));
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .framework {
      position: relative;
      z-index: 2;
      padding: 18px;
    }

    .source-switch {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 6px;
    }

    .source-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(122, 211, 255, 0.18);
      border-radius: 999px;
      padding: 7px 12px 7px 8px;
      background: rgba(255, 255, 255, 0.035);
      color: var(--text);
      cursor: pointer;
      transition: border-color 160ms ease, background 160ms ease, transform 160ms ease;
    }

    .source-btn:hover,
    .source-btn.active {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.055);
    }

    .source-btn.battery.active {
      border-color: rgba(66, 242, 161, 0.76);
      background: rgba(66, 242, 161, 0.09);
      box-shadow: 0 0 20px rgba(66, 242, 161, 0.12);
    }

    .source-btn.cbb.active {
      border-color: rgba(98, 184, 255, 0.76);
      background: rgba(98, 184, 255, 0.09);
      box-shadow: 0 0 20px rgba(98, 184, 255, 0.12);
    }

    .source-btn small {
      display: grid;
      place-items: center;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      color: #dff8ff;
      background: rgba(122, 211, 255, 0.12);
      font-size: 11px;
      font-weight: 850;
      line-height: 1;
    }

    .source-btn strong {
      font-size: 13px;
      font-weight: 820;
      white-space: nowrap;
    }

    .pill,
    .node-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      white-space: nowrap;
    }

    .pill.agent,
    .node-badge.agent {
      color: #aff3ff;
      border: 1px solid rgba(34, 216, 255, 0.34);
      background: var(--agent-soft);
    }

    .pill.human,
    .node-badge.human {
      color: #ffe1ad;
      border: 1px solid rgba(255, 189, 89, 0.36);
      background: var(--human-soft);
    }

    .pill.battery {
      color: #c5ffdf;
      border: 1px solid rgba(66, 242, 161, 0.38);
      background: var(--battery-soft);
    }

    .pill.cbb {
      color: #c8e8ff;
      border: 1px solid rgba(98, 184, 255, 0.38);
      background: var(--cbb-soft);
    }

    .flow-chart-wrap {
      position: relative;
      z-index: 10;
      overflow: visible;
      padding-bottom: 0;
    }

    .flow-chart {
      width: 100%;
      height: 700px;
      display: block;
    }

    .flow-link {
      fill: none;
      stroke: rgba(122, 211, 255, 0.28);
      stroke-width: 2;
      marker-end: url(#arrow);
    }

    .flow-link.path-hot {
      stroke: var(--path-color);
      stroke-width: 2.6;
      filter: drop-shadow(0 0 8px var(--path-glow));
    }

    .flow-link.muted {
      opacity: 0.24;
    }

    .edge-label-bg {
      fill: rgba(4, 13, 20, 0.9);
      stroke: rgba(122, 211, 255, 0.24);
      stroke-width: 1;
    }

    .edge-label-bg.muted {
      opacity: 0.36;
      stroke: rgba(142, 165, 178, 0.28);
    }

    .flow-label {
      fill: #d8edf8;
      font-size: 12px;
      font-weight: 800;
      paint-order: stroke;
      stroke: rgba(4, 13, 20, 0.9);
      stroke-width: 3px;
      stroke-linejoin: round;
    }

    .flow-label.path-hot {
      fill: #e9fbff;
      font-weight: 800;
    }

    .flow-label.muted {
      fill: rgba(164, 184, 196, 0.62);
      opacity: 0.58;
    }

    .svg-node {
      cursor: pointer;
      transition: opacity 160ms ease, filter 160ms ease;
    }

    .svg-node.muted {
      opacity: 0.32;
      cursor: default;
    }

    .svg-node .shape {
      fill: rgba(4, 13, 20, 0.78);
      stroke: rgba(122, 211, 255, 0.24);
      stroke-width: 1.4;
    }

    .svg-node.role-agent .shape {
      stroke: #22d8ff;
    }

    .svg-node.role-human .shape {
      stroke: #ffbd59;
    }

    .svg-node.role-mixed .shape {
      stroke: url(#roleGradient);
    }

    .svg-node.path-hot .shape {
      stroke-width: 2;
      filter: drop-shadow(0 0 14px var(--node-glow));
    }

    .svg-node.expanded .shape {
      stroke-width: 2.6;
      filter: drop-shadow(0 0 16px var(--node-glow));
    }

    .svg-node .title {
      fill: var(--text);
      font-size: 15px;
      font-weight: 850;
    }

    .svg-node .summary {
      fill: #9db3c1;
      font-size: 12px;
    }

    .svg-node .number {
      fill: #dff8ff;
      font-size: 12px;
      font-weight: 850;
    }

    .svg-node-tag-wrap {
      display: flex;
      justify-content: flex-end;
      gap: 6px;
      width: 100%;
      height: 24px;
      overflow: visible;
      font-family: "Inter", "Segoe UI", "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
    }

    .svg-node-tag {
      display: inline-flex;
      align-items: center;
      height: 22px;
      padding: 0 9px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 850;
      letter-spacing: 0.02em;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.22);
      white-space: nowrap;
    }

    .svg-node-tag.agent {
      border: 1px solid rgba(34, 216, 255, 0.44);
      background: #062332;
      color: #9ff2ff;
    }

    .svg-node-tag.human {
      border: 1px solid rgba(255, 189, 89, 0.5);
      background: #2b210f;
      color: #ffe0a8;
    }

    .flow-detail-layer {
      display: none;
    }

    .node-popover-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 760px;
      pointer-events: none;
      z-index: 40;
    }

    .node-popover {
      position: absolute;
      width: min(420px, calc(100% - 24px));
      pointer-events: none;
      z-index: 50;
    }

    .node-popover .flow-detail {
      margin-top: 0;
      max-height: 720px;
      overflow: auto;
      scrollbar-width: thin;
    }

    .node-tags {
      position: absolute;
      top: -12px;
      right: 18px;
      display: inline-flex;
      gap: 6px;
      align-items: center;
    }

    .node-type {
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid rgba(122, 211, 255, 0.18);
      background: #07131d;
      color: #bfefff;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.04em;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.22);
    }

    .node-type.agent-label {
      border-color: rgba(34, 216, 255, 0.44);
      background: #062332;
      color: #9ff2ff;
    }

    .node-type.human-label {
      border-color: rgba(255, 189, 89, 0.5);
      background: #2b210f;
      color: #ffe0a8;
    }

    .branch-note {
      grid-column: 2;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 2px;
      color: #b7ccd9;
      font-size: 11px;
      line-height: 1.35;
    }

    .branch-note span {
      padding: 3px 7px;
      border-radius: 999px;
      border: 1px solid rgba(122, 211, 255, 0.18);
      background: rgba(255, 255, 255, 0.04);
    }

    .flow-detail {
      margin-top: 10px;
      border: 1px solid rgba(122, 211, 255, 0.18);
      border-radius: 15px;
      padding: 14px;
      background: rgba(7, 18, 28, 0.92);
      box-shadow: 0 18px 44px rgba(0, 0, 0, 0.26);
    }

    .flow-detail h4 {
      margin: 0 0 12px;
      font-size: 15px;
      color: #dff8ff;
    }

    .flow-detail-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .flow-detail-header h4 {
      margin: 0;
    }

    .popover-role-tags {
      display: inline-flex;
      flex: 0 0 auto;
      justify-content: flex-end;
      gap: 6px;
    }

    .detail-section + .detail-section {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(122, 211, 255, 0.11);
    }

    .detail-section small {
      display: block;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
      padding: 0 0 0 10px;
      border-left: 3px solid rgba(122, 211, 255, 0.46);
      color: #b9d9e8;
      font-size: 12px;
      font-weight: 850;
      letter-spacing: 0.03em;
    }

    .detail-section ul {
      margin: 0;
      padding-left: 18px;
      color: #d1e5ef;
      font-size: 13px;
      line-height: 1.62;
    }

    .detail-section li + li {
      margin-top: 4px;
    }

    .detail-section strong {
      color: #f0fbff;
      font-weight: 850;
    }

    .detail-section.agent strong {
      color: #8ff2ff;
    }

    .detail-section.human strong {
      color: #ffda95;
    }

    .detail-section.branch strong {
      color: #bafcda;
    }

    .skill-cards {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 0 0 12px;
    }

    .skill-card {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border: 1px dashed rgba(98, 184, 255, 0.55);
      border-radius: 999px;
      padding: 6px 10px 6px 8px;
      background: rgba(34, 216, 255, 0.09);
      color: #baf4ff;
      font-size: 12px;
      line-height: 1;
      font-weight: 850;
    }

    .skill-card::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #42f2a1;
      box-shadow: 0 0 10px rgba(66, 242, 161, 0.55);
    }

    .demo {
      overflow: hidden;
    }

    .output-matrix {
      overflow: hidden;
    }

    .matrix-wrap {
      overflow-x: auto;
    }

    .matrix-table {
      width: 100%;
      min-width: 1080px;
      border-collapse: collapse;
      font-size: 13px;
    }

    .matrix-table th,
    .matrix-table td {
      padding: 14px 14px;
      border-bottom: 1px solid rgba(122, 211, 255, 0.12);
      text-align: left;
      vertical-align: top;
    }

    .matrix-table th {
      color: #bdefff;
      font-size: 12px;
      letter-spacing: 0.04em;
      font-weight: 850;
      background: rgba(8, 24, 35, 0.82);
    }

    .matrix-table td {
      color: #cfe4ef;
      line-height: 1.55;
    }

    .matrix-table tr:hover td {
      background: rgba(34, 216, 255, 0.035);
    }

    .matrix-node {
      display: grid;
      gap: 4px;
    }

    .matrix-node strong {
      color: #f0fbff;
      font-size: 14px;
    }

    .matrix-node span {
      color: var(--muted);
      font-size: 12px;
    }

    .matrix-role-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .matrix-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .matrix-tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      min-height: 24px;
      padding: 4px 9px;
      border: 1px solid rgba(122, 211, 255, 0.18);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.035);
      color: #d8edf8;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .matrix-tag.requirement {
      border-color: rgba(159, 242, 255, 0.34);
      background: rgba(34, 216, 255, 0.09);
      color: #9ff2ff;
    }

    .matrix-tag.data {
      border-color: rgba(66, 242, 161, 0.34);
      background: rgba(66, 242, 161, 0.08);
      color: #42f2a1;
    }

    .matrix-tag.model {
      border-color: rgba(255, 224, 168, 0.36);
      background: rgba(255, 189, 89, 0.08);
      color: #ffe0a8;
    }

    .matrix-tag.test {
      border-color: rgba(122, 211, 255, 0.34);
      background: rgba(122, 211, 255, 0.08);
      color: #7ad3ff;
    }

    .matrix-tag.ops {
      border-color: rgba(201, 247, 255, 0.34);
      background: rgba(201, 247, 255, 0.07);
      color: #c9f7ff;
    }

    .matrix-tag.local {
      border-color: rgba(184, 200, 214, 0.32);
      background: rgba(184, 200, 214, 0.08);
      color: #b8c8d6;
    }

    .matrix-tag.cloud {
      border-color: rgba(46, 229, 157, 0.34);
      background: rgba(46, 229, 157, 0.08);
      color: #2ee59d;
    }

    .matrix-empty {
      color: var(--dim);
      font-size: 12px;
      font-weight: 800;
    }

    .matrix-list {
      margin: 0;
      padding-left: 17px;
    }

    .matrix-list li + li {
      margin-top: 4px;
    }

    .demo-top {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      padding: 18px;
      border-bottom: 1px solid rgba(122, 211, 255, 0.14);
    }

    .scenario-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .scenario-tab {
      border: 1px solid rgba(122, 211, 255, 0.2);
      border-radius: 999px;
      padding: 10px 14px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.035);
      cursor: pointer;
    }

    .scenario-tab.active {
      color: var(--text);
      border-color: rgba(34, 216, 255, 0.62);
      background: rgba(34, 216, 255, 0.09);
    }

    .demo-body {
      display: grid;
      grid-template-columns: minmax(0, 0.92fr) minmax(420px, 1.08fr);
      gap: 18px;
      padding: 18px;
    }

    .demo-summary {
      border: 1px solid rgba(122, 211, 255, 0.14);
      border-radius: 16px;
      padding: 16px;
      background: rgba(255, 255, 255, 0.035);
      margin-bottom: 14px;
    }

    .demo-summary h3 {
      margin: 0 0 8px;
      font-size: 20px;
    }

    .demo-summary p {
      margin: 0;
      color: var(--muted);
      line-height: 1.66;
    }

    .demo-steps {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .demo-step {
      text-align: left;
      min-height: 104px;
      border: 1px solid rgba(122, 211, 255, 0.14);
      border-radius: 14px;
      padding: 13px;
      color: var(--text);
      background: rgba(4, 13, 20, 0.58);
      cursor: pointer;
      transition: border-color 160ms ease, transform 160ms ease, background 160ms ease;
    }

    .demo-step:hover,
    .demo-step.active {
      transform: translateY(-2px);
      border-color: var(--scenario-color, var(--agent));
      background: linear-gradient(180deg, var(--scenario-soft, rgba(34, 216, 255, 0.12)), rgba(4, 13, 20, 0.58));
    }

    .demo-step h4 {
      margin: 0 0 8px;
      font-size: 15px;
    }

    .demo-step p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .artifact-stage {
      border: 1px solid rgba(122, 211, 255, 0.16);
      border-radius: 18px;
      padding: 18px;
      background: rgba(5, 15, 23, 0.72);
      min-height: 588px;
    }

    .artifact-head {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }

    .artifact-head h3 {
      margin: 0 0 8px;
      font-size: 22px;
    }

    .artifact-head p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .mock {
      border: 1px solid rgba(122, 211, 255, 0.16);
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.045), rgba(255, 255, 255, 0.025));
      overflow: hidden;
    }

    .mock-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      padding: 12px 14px;
      border-bottom: 1px solid rgba(122, 211, 255, 0.12);
      color: var(--muted);
      font-size: 12px;
    }

    .mock-body {
      padding: 14px;
    }

    .kv-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .kv {
      border: 1px solid rgba(122, 211, 255, 0.12);
      border-radius: 12px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.035);
    }

    .kv span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 7px;
    }

    .kv strong {
      font-size: 15px;
      line-height: 1.45;
    }

              ["待确认", "状态字段口径、屏蔽工况、告警等级"]
            ]
          },
          {
            id: "data",
            title: "字段映射表",
            brief: "需求指标匹配生产字段",
            type: "数据准备",
            lead: "Agent 自动搜索生产库字段并标记可用性问题。",
            mock: "table",
            meta: "field mapping",
            data: [
              ["需求指标", "生产字段", "状态"],
              ["接触器反馈", "hvbox_contactor_fb", "可用"],
              ["绝缘阻值", "insulation_resistance", "缺失片段"],
              ["箱内温度", "hvbox_temp_max", "需确认采样率"]
            ]
          },
          {
            id: "eda",
            title: "数据可用性报告",
            brief: "覆盖度、缺失率、异常样本",
            type: "分析报告",
            lead: "Agent 先验证数据是否足以支撑算法设计。",
            mock: "chart",
            meta: "quality scan",
            data: ["字段覆盖率", "缺失片段", "异常样本", "采样频率", "工况覆盖", "专家待确认"]
          },
          {
            id: "confirm",
            title: "需求方确认单",
            brief: "专家口径冻结",
            type: "人工确认",
            lead: "Agent 把分析结果转成需求方可确认的问题清单。",
            mock: "check",
            meta: "CBB confirm",
            data: ["接触器反馈字段是否可作为粘连判断依据", "绝缘阻值缺失时是否允许降级判断", "温升异常是否需要区分充放电工况", "上线后告警流转责任归属"]
          },
          {
            id: "logic",
            title: "规则原型",
            brief: "触发条件与屏蔽条件",
            type: "算法逻辑",
            lead: "Agent 将确认后的需求口径转成规则草案。",
            mock: "code",
            meta: "hvbox rule draft",
            data: `IF contactor_cmd = OFF\nAND hvbox_contactor_fb = CLOSED\nAND pack_current < 2A 持续 30s\nTHEN risk = "疑似接触器粘连"\nMASK: 维护模式 / 采样缺失 / 上电瞬态`
          },
          {
            id: "ops",
            title: "运行复盘卡",
            brief: "触发样本与需求方反馈",
            type: "监控报告",
            lead: "上线后 Agent 汇总触发样本，支撑与 CBB 需求方复盘。",
            mock: "kv",
            meta: "iteration card",
            data: [
              ["触发概况", "7 天 12 次，集中在 3 个站点"],
              ["人工确认", "8 次有效，2 次维护工况误报"],
              ["建议动作", "补充维护模式屏蔽条件"],
              ["下版目标", "降低维护工况误报"]
            ]
          }
        ]
      }
    };

    let activeSource = "battery";
    const expandedFlows = new Set();

    const flowChart = document.getElementById("flowChart");
    const flowDetailLayer = document.getElementById("flowDetailLayer");
    const nodePopoverLayer = document.getElementById("nodePopoverLayer");
    const sourceButtons = document.querySelectorAll(".source-btn");
    const matrixBody = document.getElementById("matrixBody");

    function renderFlow() {
      const activeStyle = pathStyleVars();
      flowChart.innerHTML = `
        <defs>
          <linearGradient id="roleGradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#22d8ff"></stop>
            <stop offset="100%" stop-color="#ffbd59"></stop>
          </linearGradient>
          <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L8,3 z" fill="rgba(122,211,255,0.75)"></path>
          </marker>
        </defs>
        ${flowEdges.map((edge) => renderEdge(edge, activeStyle)).join("")}
        ${flowNodes.map((node, index) => renderSvgNode(node, index, activeStyle)).join("")}
      `;

      flowChart.querySelectorAll(".svg-node").forEach((node) => {
        node.addEventListener("click", (event) => {
          const id = node.dataset.flow;
          const step = flowSteps.find((item) => item.id === id);
          if (!step?.paths.includes(activeSource)) return;
          event.stopPropagation();
          if (expandedFlows.has(id)) {
            expandedFlows.delete(id);
          } else {
            expandedFlows.add(id);
          }
          renderFlow();
        });
      });

      flowDetailLayer.innerHTML = "";
      nodePopoverLayer.innerHTML = [...expandedFlows]
        .map((id) => flowSteps.find((step) => step.id === id))
        .filter(Boolean)
        .map((step) => buildNodePopover(step))
        .join("");
      requestAnimationFrame(positionNodePopovers);
    }

    function pathStyleVars() {
      return {
        color: "#62b8ff",
        soft: "rgba(98, 184, 255, 0.14)",
        glow: "rgba(98, 184, 255, 0.32)"
      };
    }

    function renderEdge(edge, style) {
      const hot = edge.paths.includes(activeSource);
      const classes = ["flow-link", hot ? "path-hot" : "muted"].join(" ");
      const label = edge.label ? renderEdgeLabel(edge.label, hot) : "";
      return `<path class="${classes}" style="--path-color:${style.color};--path-glow:${style.glow}" d="${edge.d}"></path>${label}`;
    }

    function renderEdgeLabel(label, hot) {
      const lines = label.lines || [label.text];
      const width = label.w || Math.max(110, lines.join("").length * 12);
      const height = label.h || (lines.length > 1 ? 40 : 24);
      const x = label.x - width / 2;
      const y = label.y - 17;
      const text = lines.map((line, index) =>
        `<tspan x="${label.x}" dy="${index === 0 ? 0 : 16}">${line}</tspan>`
      ).join("");
      return `
        <rect class="edge-label-bg ${hot ? "path-hot" : "muted"}" x="${x}" y="${y}" width="${width}" height="${height}" rx="12"></rect>
        <text class="flow-label ${hot ? "path-hot" : "muted"}" x="${label.x}" y="${label.y}" text-anchor="middle">${text}</text>
      `;
    }

    function renderSvgNode(node, index, style) {
      const step = flowSteps.find((item) => item.id === node.id);
      const hot = step.paths.includes(activeSource);
      const expanded = expandedFlows.has(node.id);
      const roleClass = step.roles.length > 1 ? "role-mixed" : step.roles[0] === "human" ? "role-human" : "role-agent";
      const nodeGlow = step.roles.length > 1
        ? "rgba(255, 189, 89, 0.28)"
        : step.roles[0] === "human"
          ? "rgba(255, 189, 89, 0.32)"
          : "rgba(34, 216, 255, 0.32)";
      const classes = ["svg-node", roleClass, hot ? "path-hot" : "muted", expanded ? "expanded" : ""].join(" ");
      const tagWidth = step.roles.length > 1 ? 112 : 62;
      const tagX = node.shape === "diamond"
        ? node.x + node.w / 2 - tagWidth / 2
        : node.x + node.w - tagWidth - 12;
      const tagY = node.y - 12;
      const badges = `
        <foreignObject x="${tagX}" y="${tagY}" width="${tagWidth}" height="28">
          <div xmlns="http://www.w3.org/1999/xhtml" class="svg-node-tag-wrap">
            ${step.roles.map((role) => `<span class="svg-node-tag ${role === "human" ? "human" : "agent"}">${role === "human" ? "人工" : "Agent"}</span>`).join("")}
          </div>
        </foreignObject>
      `;
      const shape = node.shape === "diamond"
        ? `<polygon class="shape" points="${node.x + node.w / 2},${node.y} ${node.x + node.w},${node.y + node.h / 2} ${node.x + node.w / 2},${node.y + node.h} ${node.x},${node.y + node.h / 2}"></polygon>`
        : `<rect class="shape" x="${node.x}" y="${node.y}" width="${node.w}" height="${node.h}" rx="${node.kind === "loop" ? 26 : 20}"></rect>`;
      const titleX = node.shape === "diamond" ? node.x + node.w / 2 : node.x + 66;
      const titleAnchor = node.shape === "diamond" ? "middle" : "start";
      const summaryX = titleX;
      const titleY = node.shape === "diamond" ? node.y + node.h / 2 - 3 : node.y + 38;
      const summaryY = node.shape === "diamond" ? node.y + node.h / 2 + 22 : node.y + 62;
      return `
        <g class="${classes}" data-flow="${node.id}" style="--path-color:${style.color};--path-glow:${style.glow};--node-glow:${nodeGlow}">
          ${shape}
          <circle cx="${node.x + 28}" cy="${node.y + node.h / 2}" r="15" fill="rgba(255,255,255,0.08)"></circle>
          <text class="number" x="${node.x + 20}" y="${node.y + node.h / 2 + 4}">${String(index + 1).padStart(2, "0")}</text>
          <text class="title" x="${titleX}" y="${titleY}" text-anchor="${titleAnchor}">${step.title}</text>
          <text class="summary" x="${summaryX}" y="${summaryY}" text-anchor="${titleAnchor}">${step.summary}</text>
          ${badges}
        </g>
      `;
    }

    function buildNodePopover(step) {
      return `<div class="node-popover" data-flow="${step.id}" style="visibility:hidden">${buildFlowDetail(step)}</div>`;
    }

    function positionNodePopovers() {
      const chartWidth = flowChart.clientWidth || 1500;
      const chartHeight = flowChart.clientHeight || 700;
      const scaleX = chartWidth / 1500;
      const scaleY = chartHeight / 700;
      const gap = 14;
      const pad = 12;

      nodePopoverLayer.querySelectorAll(".node-popover").forEach((popover) => {
        const node = flowNodes.find((item) => item.id === popover.dataset.flow);
        if (!node) return;

        popover.style.maxHeight = `${Math.max(260, chartHeight - pad * 2)}px`;
        popover.style.left = "0px";
        popover.style.top = "0px";

        const popoverWidth = popover.offsetWidth;
        const popoverHeight = Math.min(popover.offsetHeight, chartHeight - pad * 2);
        const left = node.x * scaleX;
        const top = node.y * scaleY;
        const width = node.w * scaleX;
        const height = node.h * scaleY;
        const centerX = left + width / 2;
        const centerY = top + height / 2;

        const placements = [
          { name: "bottom", x: centerX - popoverWidth / 2, y: top + height + gap },
          { name: "top", x: centerX - popoverWidth / 2, y: top - popoverHeight - gap },
          { name: "left", x: left - popoverWidth - gap, y: centerY - popoverHeight / 2 },
          { name: "right", x: left + width + gap, y: centerY - popoverHeight / 2 }
        ];

        const fits = (place) =>
          place.x >= pad &&
          place.y >= pad &&
          place.x + popoverWidth <= chartWidth - pad &&
          place.y + popoverHeight <= chartHeight - pad;
        const best = placements.find(fits) || placements.reduce((bestPlace, place) => {
          const overflow =
            Math.max(0, pad - place.x) +
            Math.max(0, pad - place.y) +
            Math.max(0, place.x + popoverWidth - chartWidth + pad) +
            Math.max(0, place.y + popoverHeight - chartHeight + pad);
          return overflow < bestPlace.overflow ? { ...place, overflow } : bestPlace;
        }, { ...placements[0], overflow: Number.POSITIVE_INFINITY });

        const x = Math.min(Math.max(best.x, pad), Math.max(pad, chartWidth - popoverWidth - pad));
        const y = Math.min(Math.max(best.y, pad), Math.max(pad, chartHeight - popoverHeight - pad));
        popover.dataset.placement = best.name;
        popover.style.left = `${Math.round(x)}px`;
        popover.style.top = `${Math.round(y)}px`;
        popover.style.visibility = "visible";
      });
    }

    function buildFlowDetail(step) {
      const detail = getSourceDetail(step);
      const skillSection = step.skills?.length
        ? `<div class="skill-cards">${step.skills.map((id) => {
          const skill = skillCatalog[id];
          return `<span class="skill-card">${skill.name}</span>`;
        }).join("")}</div>`
        : "";
      const agentSection = step.roles.includes("agent") && detail.agent?.length
        ? `<div class="detail-section agent"><small>Agent 执行</small><ul>${detail.agent.map((item) => `<li>${item}</li>`).join("")}</ul></div>`
        : "";
      const humanSection = step.roles.includes("human") && detail.human?.length
        ? `<div class="detail-section human"><small>人工介入</small><ul>${detail.human.map((item) => `<li>${item}</li>`).join("")}</ul></div>`
        : "";
      const roleSections = step.id === "intake"
        ? `${humanSection}${agentSection}`
        : `${agentSection}${humanSection}`;
      const outputItems = detail.outputs.map((item) => `<li>${item}</li>`).join("");
      const roleTags = `<div class="popover-role-tags">${step.roles.map((role) => `<span class="svg-node-tag ${role === "human" ? "human" : "agent"}">${role === "human" ? "人工" : "Agent"}</span>`).join("")}</div>`;
      return `
        <div class="flow-detail ${step.roles.join(" ")}">
          <div class="flow-detail-header">
            <h4>${step.title}</h4>
            ${roleTags}
          </div>
          ${skillSection}
          ${roleSections}
          <div class="detail-section output">
            <small>关键交付物</small>
            <ul>${outputItems}</ul>
          </div>
        </div>
      `;
    }

    function getSourceDetail(step) {
      const detail = sourceFlowDetails[activeSource]?.[step.id] || {};
      return {
        agent: detail.agent || detail.support || [],
        human: detail.human || detail.decision || [],
        branch: detail.branch || step.branch || [],
        outputs: detail.outputs || ["待生成交付物"]
      };
    }

    sourceButtons.forEach((button) => {
      button.addEventListener("click", () => {
        activeSource = button.dataset.source;
        sourceButtons.forEach((item) => item.classList.toggle("active", item === button));
        expandedFlows.clear();
        renderFlow();
      });
    });

    document.addEventListener("click", () => {
      if (!expandedFlows.size) return;
      expandedFlows.clear();
      renderFlow();
    });

    function renderOutputMatrix() {
      if (!matrixBody) return;
      matrixBody.innerHTML = matrixRows.map((row) => {
        const step = flowSteps.find((item) => item.id === row.id);
        return `
          <tr>
            <td>
              <div class="matrix-node">
                <strong>${step.title}</strong>
                <span>${step.summary}</span>
              </div>
            </td>
            <td>${renderRoleTags(step.roles)}</td>
            <td>${row.path}</td>
            <td>${renderMatrixTags(row.skills, "skill")}</td>
            <td>${renderMatrixTags(row.platforms, "platform")}</td>
            <td><ul class="matrix-list">${row.outputs.map((item) => `<li>${item}</li>`).join("")}</ul></td>
          </tr>
        `;
      }).join("");
    }

    function renderRoleTags(roles) {
      return `<div class="matrix-role-tags">${roles.map((role) => `<span class="svg-node-tag ${role === "human" ? "human" : "agent"}">${role === "human" ? "人工" : "Agent"}</span>`).join("")}</div>`;
    }

    function renderMatrixTags(items, type) {
      if (!items.length) return `<span class="matrix-empty">/</span>`;
      return `<div class="matrix-tags">${items.map((item) => `<span class="matrix-tag ${type} ${matrixTagClass(item)}">${item}</span>`).join("")}</div>`;
    }

    function matrixTagClass(item) {
      if (item.includes("需求解析")) return "requirement";
      if (item.includes("数据提取")) return "data";
      if (item.includes("模型设计")) return "model";
      if (item.includes("模型测试")) return "test";
      if (item.includes("运营监测")) return "ops";
      if (item === "本地") return "local";
      if (item === "云端") return "cloud";
      return "";
    }

    window.addEventListener("resize", () => {
      if (expandedFlows.size) requestAnimationFrame(positionNodePopovers);
    });

    renderFlow();
    renderOutputMatrix();
  </script>
